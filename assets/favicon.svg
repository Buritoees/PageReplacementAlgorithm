<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#gradient)" opacity="0.9" />
  
  <!-- CPU/Processor icon -->
  <rect x="30" y="30" width="40" height="40" rx="8" fill="white" opacity="0.9" />
  
  <!-- Inner squares for processor look -->
  <rect x="35" y="35" width="10" height="10" rx="2" fill="#4f46e5" />
  <rect x="55" y="35" width="10" height="10" rx="2" fill="#10b981" />
  <rect x="35" y="55" width="10" height="10" rx="2" fill="#f59e0b" />
  <rect x="55" y="55" width="10" height="10" rx="2" fill="#ef4444" />
  
  <!-- Connecting lines -->
  <line x1="45" y1="40" x2="55" y2="40" stroke="#4f46e5" stroke-width="2" />
  <line x1="60" y1="45" x2="60" y2="55" stroke="#10b981" stroke-width="2" />
  <line x1="45" y1="60" x2="55" y2="60" stroke="#f59e0b" stroke-width="2" />
  <line x1="40" y1="45" x2="40" y2="55" stroke="#ef4444" stroke-width="2" />
</svg>